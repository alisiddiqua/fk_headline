name: fk_headline
description: FK Headline - Android News App for Fikrokhabar.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.2
  dio: ^5.3.3
  flutter_riverpod: ^2.4.3
  flutter_html: ^3.0.0-beta.2
  go_router: ^12.0.0
  shared_preferences: ^2.2.1
  url_launcher: ^6.1.14
  cached_network_image: ^3.3.0
  share_plus: ^9.0.0
  intl: ^0.20.2
  html: ^0.15.4

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter_launcher_icons:
  android: true
  image_path: "assets/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
